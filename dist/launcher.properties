# Launcher settings for 2006 Revival
#
# Dedicated update repo for THIS game only.
# Kept separate from unrelated RSPS projects.

# Dedicated PUBLIC update repo (launcher + client runtime only, no server source).
update-repo-url=https://github.com/tristan9988/tristans-2006-launcher.git

# Branch to pull from when update-repo-url is set.
update-branch=main

# Game folder layout - everything is in the same folder as the launcher.
game-root-name=.
client-folder-name=2006Redone Client

# Public host the launcher should pass to the bundled client.
# This is YOUR public IP - friends connect here.
server-host=90.217.81.162

# Optional runtime payload zip for the smaller shareable launcher build.
# If left blank, place Tristans2006ClientPayload.zip next to the launcher jar.
client-payload-url=

# Keep friend-facing launcher installs on the prebuilt client by default.
rebuild-client-on-launch=false

# Only enable this for developer/testing builds of the launcher payload.
bundle-client-sources=false

